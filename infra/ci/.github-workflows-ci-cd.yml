name: NexoraField CI/CD Enterprise Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  PROJECT_ID: nexorafield-prod
  REGION: southamerica-east1
  IMAGE: gcr.io/nexorafield-prod/api
  GKE_CLUSTER: nexora-cluster-prod
  GKE_ZONE: southamerica-east1-a
  NAMESPACE: nexorafield

jobs:
  # ─────────────────────────────────────────────
  # 1. LINT & TYPE CHECK
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # 2. SECURITY SCANS
  # ─────────────────────────────────────────────
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
      - name: SAST scan (CodeQL)
        uses: github/codeql-action/analyze@v3
        with:
          languages: typescript
      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"

  # ─────────────────────────────────────────────
  # 3. BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, security]
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      sha_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  # ─────────────────────────────────────────────
  # 4. DEPLOY — STAGING (automatic)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: nexora-cluster-staging
          location: ${{ env.GKE_ZONE }}
      - name: Deploy to staging
        run: |
          kubectl set image deployment/nexora-api \
            api=${{ env.IMAGE }}:sha-${{ github.sha }} \
            -n nexorafield-staging
          kubectl rollout status deployment/nexora-api -n nexorafield-staging --timeout=5m
      - name: Smoke test staging
        run: |
          STAGING_URL=$(kubectl get svc nexora-api-lb -n nexorafield-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f https://$STAGING_URL/api/health || exit 1

  # ─────────────────────────────────────────────
  # 5. DEPLOY — PRODUCTION (manual approval)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://app.nexorafield.com.br
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
      - name: Canary deploy (20% traffic)
        run: |
          kubectl set image deployment/nexora-api-canary \
            api=${{ env.IMAGE }}:sha-${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/nexora-api-canary -n ${{ env.NAMESPACE }} --timeout=5m
      - name: Wait 5 min — monitor error rate
        run: sleep 300
      - name: Promote to full production (100% traffic)
        run: |
          kubectl set image deployment/nexora-api \
            api=${{ env.IMAGE }}:sha-${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/nexora-api -n ${{ env.NAMESPACE }} --timeout=10m
      - name: Health check production
        run: curl -f https://app.nexorafield.com.br/api/health || exit 1
      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/nexora-api -n ${{ env.NAMESPACE }}

  # ─────────────────────────────────────────────
  # 6. RELEASE NOTES
  # ─────────────────────────────────────────────
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: CHANGELOG.md
