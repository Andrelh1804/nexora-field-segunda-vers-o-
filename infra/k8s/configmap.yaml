apiVersion: v1
kind: ConfigMap
metadata:
  name: nexora-config
  namespace: nexorafield
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  REGION: "southamerica-east1"
  APP_NAME: "nexorafield"
  GEMINI_MODEL: "gemini-3.5-flash"
  JWT_EXPIRY: "2h"
  RATE_LIMIT_WINDOW: "60"
  RATE_LIMIT_MAX: "100"
  CORS_ORIGIN: "https://nexorafield.replit.app"
  TZ: "America/Sao_Paulo"
