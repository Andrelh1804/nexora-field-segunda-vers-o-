apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexora-ingress
  namespace: nexorafield
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "nexora-global-ip"
    networking.gke.io/managed-certificates: "nexora-ssl-cert"
    networking.gke.io/v1beta1.FrontendConfig: "nexora-frontend-config"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  rules:
    - host: app.nexorafield.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexora-api-svc
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: nexora-frontend-config
  namespace: nexorafield
spec:
  sslPolicy: nexora-ssl-policy
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
