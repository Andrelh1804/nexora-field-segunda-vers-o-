apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-api
  namespace: nexorafield
  labels:
    app: nexora-api
    version: v7.0.0
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexora-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexora-api
        version: v7.0.0
    spec:
      serviceAccountName: nexora-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [nexora-api]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: gcr.io/nexorafield/api:7.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: 5000
            failureThreshold: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-worker-ai
  namespace: nexorafield
  labels:
    app: nexora-worker-ai
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexora-worker-ai
  template:
    metadata:
      labels:
        app: nexora-worker-ai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: worker-ai
          image: gcr.io/nexorafield/worker-ai:7.0.0
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
